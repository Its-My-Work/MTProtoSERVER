{% extends "base.html" %}
{% block title %}Авторизация - MTProtoSERVER{% endblock %}
{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">🛡️</div>
        <h2>MTProtoSERVER</h2>
        <p class="login-subtitle">Введите API-токен для доступа к панели управления</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="token">API Токен</label>
                <div class="input-wrapper">
                    <input type="password" id="token" name="token" required
                           placeholder="Введите API токен"
                           autocomplete="current-password"
                           minlength="8">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">
                <span id="btnText">Войти</span>
                <span id="btnLoader" style="display:none;">⏳ Проверка...</span>
            </button>
        </form>

        <div id="error" class="error-message" style="display: none;"></div>
    </div>
</div>

<style>
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
}

.login-card {
    background: var(--card-bg, #fff);
    color: var(--text-color, #333);
    padding: 2.5rem;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 420px;
    text-align: center;
}

.login-logo {
    font-size: 3rem;
    margin-bottom: 0.5rem;
}

.login-card h2 {
    margin-bottom: 0.5rem;
    font-size: 1.5rem;
}

.login-subtitle {
    color: var(--text-muted, #666);
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
}

.form-group {
    margin-bottom: 1.5rem;
    text-align: left;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    font-size: 0.9rem;
}

.input-wrapper {
    position: relative;
}

.form-group input {
    width: 100%;
    padding: 0.75rem 2.5rem 0.75rem 0.75rem;
    border: 2px solid var(--border-color, #ddd);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--input-bg, #fff);
    color: var(--text-color, #333);
    transition: border-color 0.2s;
    box-sizing: border-box;
}

.form-group input:focus {
    outline: none;
    border-color: var(--primary-color, #007bff);
}

.toggle-password {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px;
}

.btn {
    width: 100%;
    padding: 0.85rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
}

.btn:active {
    transform: scale(0.98);
}

.btn-primary {
    background: var(--primary-color, #007bff);
    color: white;
}

.btn-primary:hover {
    background: var(--primary-hover, #0056b3);
}

.btn-primary:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

.error-message {
    margin-top: 1rem;
    padding: 0.75rem;
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    border-radius: 8px;
    text-align: center;
    font-size: 0.9rem;
}
</style>

<script>
function togglePasswordVisibility() {
    const input = document.getElementById('token');
    input.type = input.type === 'password' ? 'text' : 'password';
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const token = document.getElementById('token').value.trim();
    const errorDiv = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');

    if (!token) {
        errorDiv.textContent = 'Введите токен';
        errorDiv.style.display = 'block';
        return;
    }

    // Блокируем кнопку
    submitBtn.disabled = true;
    btnText.style.display = 'none';
    btnLoader.style.display = 'inline';
    errorDiv.style.display = 'none';

    try {
        const response = await fetch('/api/auth/verify', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({ token: token })
        });

        const data = await response.json();

        if (data.status === 'ok') {
            // Cookie устанавливается сервером через Set-Cookie header
            window.location.href = '/';
        } else {
            errorDiv.textContent = data.message || 'Неверный токен';
            errorDiv.style.display = 'block';
        }
    } catch (error) {
        errorDiv.textContent = 'Ошибка сети. Проверьте подключение.';
        errorDiv.style.display = 'block';
    } finally {
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnLoader.style.display = 'none';
    }
});
</script>
{% endblock %}
